This file has been moved to home assistant / other-batteries / Anker-SB3 / anker_to_m1_marstek.yaml
It provides a read-only interface to the Anker SolarBank 3 Pro Battery and fakes to be a Marstek M1 Battery that can be used by HBC.

Warning: The Anker to M1 Marstek yaml file is only to be placed in the packages folder when you own an ANKER SolarBank 3 Pro instead of a Marstek Venus 3.

Recently an (update) automation has been developed that will start and stop charging and discharging of the Anker Battery.
Limited testing has been done with HBC in update mode. 
Please provide feedback if you experience problems.

Important limitations:
- The HBC Self-Consumption is not supported since power updates are applied via the Anker Cloud and will be to slow.
- Very Important: Set all PID values to 0 so that the power in consumption mode will be 0 !
- In future the native smartmeter mode of the Anker will be activated when HBC changes to Self-consumption mode.

- If HBC switches to often the forcible charge/discharge state then updates to the Anker Battery will be lost (and will not recover).
- The Anker Cloud will only accept updates every 30s
- In future a variable wait will be implemented based on the last applied update timestamp

- Maximum Charge and Discharge Limits cannot be changed for the Anker Battery in HBC.
- In the future this will be possible but it is not fully clear how to implement this.
- Anker Solarbank does not allow random values of the limits and the input limit is (mis)-used by this interfade for steering the charging of the battery
